<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM WEBSITE</title>

    <!-- Animation CSS -->
    <link rel="stylesheet" href="css/mainpage.css">

    <!-- Homepage CSS -->
    <link rel="stylesheet" href="css/homepage.css">
</head>

<body>

<!-- ⭐ FIRST SCREEN: FULL PAGE ANIMATION -->
<div id="animation-screen">
    <div class="container">
        <h1 class="anim-text">WELCOME TO THE GYM</h1>
    </div>
</div>

<!-- ⭐ SECOND SCREEN: MAIN HOMEPAGE (HIDDEN INITIALLY) -->
<div id="main-content">

<header>
    <div class="logo">
        <img src="IMAGES FOR GYM WEBSITE/aa.png" alt="Logo">
    </div>

    <nav>
        <ul>
            <li><a href="#">HOME</a></li>
            <li><a href="#">ABOUT</a></li>
            <li><a href="#">CLASSES</a></li>
            <li><a href="#">CONTACT US</a></li>
        </ul>
    </nav>

    <button class="btn" onclick="window.location.href='login.html'">LOGIN / SIGNUP</button>
</header>

<section class="hero">
    <h1>Transform Your Body</h1>
</section>

<footer>
    <div>
        <h3>Quick Links</h3>
        <ul>
            <li><a href="#">Membership</a></li>
            <li><a href="#">Trainers</a></li>
            <li><a href="#">Programs</a></li>
            <li><a href="#">Schedule</a></li>
        </ul>
    </div>

    <div>
        <h3>Contact Info</h3>
        <p>📍 Delhi, India</p>
        <p>📞 +9192XXXXXXXX</p>
        <p>✉ gym@gmail.com</p>
    </div>

    <div>
        <h3>Subscribe</h3>
        <input type="email" placeholder="Enter your email">
        <button class="subscribe-btn">Subscribe</button>
    </div>

    <div>
        <h3>Follow Us</h3>
        <div class="social-icons">
            <img src="IMAGES FOR GYM WEBSITE/10464408.png">
            <img src="IMAGES FOR GYM WEBSITE/sl_z_072523_61700_01.jpg">
            <img src="IMAGES FOR GYM WEBSITE/youtube-logo-png-46031.png">
        </div>
    </div>

    <p class="footer-bottom">© 2025 Gym — All Rights Reserved</p>
</footer>

</div>

<!-- ⭐ JavaScript to hide animation and show homepage -->
<script>
    document.querySelector(".anim-text").addEventListener("animationend", () => {
        document.getElementById("animation-screen").style.display = "none";
        document.getElementById("main-content").style.display = "block";
    });
</script>

</body>
</html>
