<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4b79a1, #283e51);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-container {
            background: #ffffff;
            width: 360px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 23px;
            font-size: 24px;
            color: #283e51;
            font-weight: 600;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .input-box {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            margin-top: 6px;
            border: 1px solid #aaa;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s ease;
        }

        input:focus {
            border-color: #4b79a1;
            outline: none;
            box-shadow: 0 0 4px #4b79a1;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: #4b79a1;
            border-radius: 8px;
            font-size: 15px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            background: #35516b;
        }

        .small-text {
            text-align: center;
            font-size: 14px;
            margin-top: 12px;
        }

        a {
            color: #283e51;
            font-weight: 600;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="form-container">
        <h2>Login</h2>

        <form>
            <div class="input-box">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Enter email" required>
            </div>

            <div class="input-box">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <button class="btn" type="submit">Login</button>

            <p class="small-text">Don’t have an account? 
                <a href="Registration_page.html">Register Now</a> 
            </p>
        </form>
    </div>

</body>
</html>
